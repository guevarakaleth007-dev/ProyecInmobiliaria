<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Inmobiliaria</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h1>🏢 Inmobiliaria</h1>
                <p>Inicia sesión para continuar</p>
            </div>

            <div id="mensaje" class="mensaje hidden"></div>

            <div class="auth-form">
                <div class="form-group">
                    <label for="nombreUsuario">Usuario</label>
                    <input type="text" id="nombreUsuario" placeholder="Nombre de usuario" />
                </div>
                <div class="form-group">
                    <label for="clave">Contraseña</label>
                    <input type="password" id="clave" placeholder="Contraseña" />
                </div>
                <button class="btn-primary" onclick="login()">Ingresar</button>
            </div>

            <div class="auth-footer">
                <p>¿No tienes cuenta? <a href="../register/index.html">Regístrate aquí</a></p>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
