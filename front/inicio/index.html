<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio - Inmobiliaria</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
 
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            min-height: 100vh;
        }
 
        .navbar {
            background: #343a40;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
 
        .navbar h2 { font-size: 20px; }
 
        .navbar span { font-size: 14px; opacity: 0.8; }
 
        .btn-salir {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
 
        .welcome {
            text-align: center;
            padding: 50px 20px 30px;
            color: #333;
        }
 
        .welcome h1 { font-size: 28px; margin-bottom: 8px; }
        .welcome p  { color: #666; font-size: 15px; }
 
        .grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            padding: 20px 40px 40px;
            max-width: 900px;
            margin: 0 auto;
        }
 
        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 25px 30px;
            text-align: center;
            width: 180px;
            text-decoration: none;
            color: #333;
            transition: transform 0.15s, box-shadow 0.15s;
        }
 
        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(0,0,0,0.15);
        }
 
        .card .icon { font-size: 36px; margin-bottom: 10px; }
        .card .label { font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>
 
<nav class="navbar">
    <h2>🏢 Inmobiliaria</h2>
    <span id="bienvenida"></span>
    <button class="btn-salir" onclick="cerrarSesion()">Cerrar sesión</button>
</nav>
 
<div class="welcome">
    <h1>Panel de administración</h1>
    <p>Seleccioná un módulo para comenzar</p>
</div>
 
<div class="grid">
 
    <a class="card" href="../tipoPersona/index.html">
        <div class="icon">👤</div>
        <div class="label">Tipo Persona</div>
    </a>
 
    <a class="card" href="../persona/index.html">
        <div class="icon">🧑</div>
        <div class="label">Persona</div>
    </a>
 
    <a class="card" href="../empleado/index.html">
        <div class="icon">👷</div>
        <div class="label">Empleado</div>
    </a>
 
    <a class="card" href="../cliente/index.html">
        <div class="icon">🤝</div>
        <div class="label">Cliente</div>
    </a>
 
    <a class="card" href="../propietario/index.html">
        <div class="icon">🏠</div>
        <div class="label">Propietario</div>
    </a>

    <a class="card" href="../pais/index.html">
        <div class="icon">🌎</div>
        <div class="label">País</div>
    </a>

    <a class="card" href="../departamento/index.html">
        <div class="icon">🗺️</div>
        <div class="label">Departamento</div>
    </a>

    <a class="card" href="../ciudad/index.html">
        <div class="icon">🏙️</div>
        <div class="label">Ciudad</div>
    </a>
 
</div>
 
<script>
    if (!localStorage.getItem("idUsuario")) {
        window.location.href = "../login/index.html";
    }
 
    document.getElementById("bienvenida").textContent =
        "Bienvenido, " + (localStorage.getItem("nombreCompleto") || "Usuario");
 
    function cerrarSesion() {
        localStorage.clear();
        window.location.href = "../login/index.html";
    }
</script>
 
</body>
</html>
