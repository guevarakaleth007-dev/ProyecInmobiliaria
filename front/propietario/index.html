<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CRUD Propietario</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>Gestión de Propietarios</h1>
    <div class="card">
        <h2 id="form-titulo">Nuevo Propietario</h2>
        <div class="form-grid">
            <div class="form-group full-width">
                <label>Persona *</label>
                <select id="idPersona"></select>
            </div>
        </div>
        <div class="form-actions">
            <button class="btn-guardar"  onclick="guardar()">💾 Guardar</button>
            <button class="btn-cancelar" onclick="limpiar()">✖ Cancelar</button>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID Propietario</th>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Teléfono</th>
                <th>Correo</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tabla"></tbody>
    </table>
</div>
<script src="app.js"></script>
</body>
</html>
