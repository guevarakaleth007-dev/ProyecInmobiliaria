<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CRUD Departamento</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🗺️ Gestión de Departamentos</h1>

    <div class="card">
        <h2 id="form-titulo">Nuevo Departamento</h2>
        <div class="form-grid">
            <div class="form-group">
                <label>País *</label>
                <select id="idPais" onchange="filtrarPorPais()">
                    <option value="">-- Seleccione un país --</option>
                </select>
            </div>
            <div class="form-group">
                <label>Nombre del Departamento *</label>
                <input type="text" id="nombre" placeholder="Ej: Antioquia">
            </div>
        </div>
        <div class="form-actions">
            <button class="btn-guardar" onclick="guardar()">💾 Guardar</button>
            <button class="btn-cancelar" onclick="limpiar()">✖ Cancelar</button>
        </div>
    </div>

    <!-- Filtro de tabla por país -->
    <div class="card" style="padding: 16px 28px;">
        <label style="font-size:13px; font-weight:bold; color:#444;">Filtrar tabla por país:</label>
        <select id="filtroPais" onchange="listar()" style="margin-left:10px; padding:7px 12px; border-radius:5px; border:1px solid #ccc; font-size:14px;">
            <option value="">-- Todos --</option>
        </select>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>País</th>
                <th>Departamento</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tabla"></tbody>
    </table>
</div>

<script src="app.js"></script>
</body>
</html>
