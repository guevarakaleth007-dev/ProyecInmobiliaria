<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CRUD Empleado</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>Gestión de Empleados</h1>
    <div class="card">
        <h2 id="form-titulo">Nuevo Empleado</h2>
        <div class="form-grid">
            <div class="form-group">
                <label>Persona *</label>
                <select id="idPersona"></select>
            </div>
            <div class="form-group">
                <label>Cargo</label>
                <input type="text" id="cargo" placeholder="Cargo del empleado">
            </div>
        </div>
        <div class="form-actions">
            <button class="btn-guardar"  onclick="guardar()">💾 Guardar</button>
            <button class="btn-cancelar" onclick="limpiar()">✖ Cancelar</button>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID Empleado</th>
                <th>Persona</th>
                <th>Cargo</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tabla"></tbody>
    </table>
</div>
<script src="app.js"></script>
</body>
</html>
